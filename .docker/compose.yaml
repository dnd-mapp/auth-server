name: dnd-mapp
services:
    auth-server:
        image: dndmapp/auth-server:latest
        container_name: auth-server
        restart: unless-stopped
        depends_on:
            mariadb-server:
                condition: service_healthy
        ports:
            - '4350:4350/tcp'
    mariadb-server:
        image: mariadb:latest
        container_name: mariadb
        restart: unless-stopped
        ports:
            - '3306:3306/tcp'
        environment:
            - MARIADB_DATABASE=dma_auth_dev
            - MARIADB_USER=dma_auth_dev_user
            - MARIADB_PASSWORD_FILE=/run/secrets/user-password
            - MARIADB_ROOT_PASSWORD_FILE=/run/secrets/root-password
        secrets:
            - user-password
            - root-password
        volumes:
            - ./data/mariadb:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 3
    dbeaver:
        image: dbeaver/cloudbeaver:latest
        container_name: dbeaver
        restart: unless-stopped
        depends_on:
            mariadb-server:
                condition: service_healthy
        ports:
            - '8978:8978/tcp'
        volumes:
            - ./data/dbeaver:/opt/cloudbeaver/workspace
secrets:
    user-password:
        file: ./secrets/mariadb/user.txt
    root-password:
        file: ./secrets/mariadb/root.txt
